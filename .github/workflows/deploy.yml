name: Deploy Web

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - run: flutter pub get

      - run: flutter build web --dart-define=API_URL=${{ secrets.API_URL }} --release

      - name: Deploy via FTP
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -c "
            open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_HOST }};
            set ftp:ssl-allow no;
            set ftp:passive-mode on;
            set net:max-retries 3;
            mirror -R --delete --verbose \
              --exclude .git \
              ./build/web/ ./;
            quit
          "
