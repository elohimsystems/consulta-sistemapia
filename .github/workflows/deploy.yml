name: Deploy Web

on:
  push:
    branches: [develop, main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - run: flutter pub get

      - name: Build
        env:
          API_URL: ${{ (github.ref_name == 'main' || github.ref_name == 'master') && secrets.API_URL_PROD || secrets.API_URL }}
        run: flutter build web --dart-define=API_URL=$API_URL --release

      - run: cp web/.htaccess build/web/.htaccess

      - name: Deploy via FTP
        env:
          IS_PROD: ${{ github.ref_name == 'main' || github.ref_name == 'master' }}
          FTP_USERNAME: ${{ (github.ref_name == 'main' || github.ref_name == 'master') && secrets.FTP_USERNAME_PROD || secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ (github.ref_name == 'main' || github.ref_name == 'master') && secrets.FTP_PASSWORD_PROD || secrets.FTP_PASSWORD }}
          FTP_HOST: ${{ (github.ref_name == 'main' || github.ref_name == 'master') && secrets.FTP_HOST_PROD || secrets.FTP_HOST }}
          FTP_WEB_DIR: ${{ (github.ref_name == 'main' || github.ref_name == 'master') && secrets.FTP_WEB_DIR_PROD || secrets.FTP_WEB_DIR }}
        run: |
          echo "Desplegando a $([ $IS_PROD = true ] && echo 'PRODUCCIÓN' || echo 'DESARROLLO')..."
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -c "
            open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_HOST;
            set ftp:ssl-allow no;
            set ftp:passive-mode on;
            set net:max-retries 3;
            mirror -R --verbose \
              --exclude .git \
              ./build/web/ $FTP_WEB_DIR;
            quit
          "
